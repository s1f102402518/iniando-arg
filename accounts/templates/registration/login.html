{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>鴉ヶ丘大学 学生自由掲示板 - ログイン</title>
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
</head>
<body>
  <div class="container">
    <header>
      <p class="system-info">
        <b>現在時刻: <span id="realtime-clock">読み込み中...</span> JST</b> | <b>学内認証システム経由</b>
      </p>
    </header>

    <main>
      <h1>【重要】学内掲示板へのアクセス認証</h1>

      {% if form.errors %}
      <div class="error-message">
        <p>!! 認証情報が一致しませんでした。ユーザーIDとパスワードを再度確認してください。</p>
      </div>
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
                        
        {{ form.as_p }}
                        
        <input type="submit" value="アクセス認証" class="auth-button" />
      </form>

      <div class="footer-links">
        <a href="{% url 'home' %}">トップページへ戻る</a>
      </div>
    </main>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      const timeString = `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
      document.getElementById('realtime-clock').innerText = timeString;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
